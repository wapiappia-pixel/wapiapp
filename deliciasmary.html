<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Las Delicias de Mary | Menú Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --brand-red: #d62828;
        --brand-yellow: #fbc02d;
      }
      .bg-brand-red {
        background-color: var(--brand-red);
      }
      .text-brand-red {
        color: var(--brand-red);
      }

      /* Barra de desplazamiento personalizada */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--brand-red);
        border-radius: 10px;
      }

      .modal-enter {
        animation: slideUp 0.3s ease-out;
      }
      @keyframes slideUp {
        from {
          transform: translateY(100%);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="bg-gray-50 font-sans text-gray-900 flex flex-col min-h-screen">
    <!-- CABECERA -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
      <div
        class="container mx-auto px-4 py-4 flex justify-between items-center"
      >
        <div>
          <h1
            class="text-xl font-black text-red-700 tracking-tighter uppercase italic"
          >
            Las Delicias de Mary
          </h1>
          <p
            class="text-[10px] text-gray-400 uppercase tracking-widest font-bold"
          >
            Pastelería & Fast Food
          </p>
        </div>
        <div class="bg-red-50 p-2 rounded-full">
          <svg
            class="w-6 h-6 text-red-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
            ></path>
          </svg>
        </div>
      </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-2xl flex-grow">
      <!-- NAVEGACIÓN DE CATEGORÍAS -->
      <div
        class="flex space-x-2 overflow-x-auto pb-4 mb-6 no-scrollbar sticky top-[73px] bg-gray-50 z-40 py-2"
      >
        <button
          onclick="scrollToSection('completos')"
          class="px-4 py-2 bg-red-600 text-white rounded-full text-sm font-bold whitespace-nowrap shadow-sm"
        >
          🌭 Completos
        </button>
        <button
          onclick="scrollToSection('sandwiches')"
          class="px-4 py-2 bg-white border border-gray-200 rounded-full text-sm font-bold whitespace-nowrap"
        >
          🍔 Sandwiches
        </button>
        <button
          onclick="scrollToSection('papas')"
          class="px-4 py-2 bg-white border border-gray-200 rounded-full text-sm font-bold whitespace-nowrap"
        >
          🍟 Papas
        </button>
        <button
          onclick="scrollToSection('bebidas')"
          class="px-4 py-2 bg-white border border-gray-200 rounded-full text-sm font-bold whitespace-nowrap"
        >
          🥤 Bebidas
        </button>
        <button
          onclick="scrollToSection('pasteles')"
          class="px-4 py-2 bg-white border border-gray-200 rounded-full text-sm font-bold whitespace-nowrap"
        >
          🍰 Dulces
        </button>
      </div>

      <!-- SECCIONES DE PRODUCTOS -->
      <div id="menu-container">
        <section id="completos" class="mb-10">
          <h2 class="text-lg font-black mb-4 flex items-center text-gray-800">
            <span class="w-2 h-6 bg-red-600 mr-2 rounded-full"></span>
            COMPLETOS
          </h2>
          <div class="space-y-4" id="list-completos"></div>
        </section>

        <section id="sandwiches" class="mb-10">
          <h2 class="text-lg font-black mb-4 flex items-center text-gray-800">
            <span class="w-2 h-6 bg-orange-500 mr-2 rounded-full"></span>
            SANDWICHES
          </h2>
          <div class="space-y-4" id="list-sandwiches"></div>
        </section>

        <section id="papas" class="mb-10">
          <h2 class="text-lg font-black mb-4 flex items-center text-gray-800">
            <span class="w-2 h-6 bg-yellow-500 mr-2 rounded-full"></span>
            PAPAS FRITAS
          </h2>
          <div class="space-y-4" id="list-papas"></div>
        </section>

        <section id="bebidas" class="mb-10">
          <h2 class="text-lg font-black mb-4 flex items-center text-gray-800">
            <span class="w-2 h-6 bg-blue-500 mr-2 rounded-full"></span>
            BEBIDAS Y LÍQUIDOS
          </h2>
          <div class="space-y-4" id="list-bebidas"></div>
        </section>

        <section id="pasteles" class="mb-10">
          <h2 class="text-lg font-black mb-4 flex items-center text-gray-800">
            <span class="w-2 h-6 bg-pink-500 mr-2 rounded-full"></span>
            PASTELERÍA
          </h2>
          <div class="space-y-4" id="list-pasteles"></div>
        </section>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-t border-gray-100 py-10 mt-10">
      <div class="container mx-auto px-4 text-center">
        <img
          src="https://i.imgur.com/WVWMcSO.png"
          alt="Logo Mary"
          class="h-16 mx-auto mb-4 opacity-80 grayscale hover:grayscale-0 transition-all"
        />
        <div class="mb-4">
          <p
            class="text-xs text-gray-400 font-bold uppercase tracking-widest mb-2"
          >
            Impulsado por
          </p>
          <a
            href="https://www.instagram.com/wapiapp?igsh=MTRuamVtenJjb3ZuMQ=="
            target="_blank"
            class="inline-flex items-center space-x-2 bg-gray-50 px-4 py-2 rounded-xl border border-gray-100 hover:bg-gray-100 transition-colors"
          >
            <span class="text-sm font-black text-green-600">Wapi APP</span>
            <span class="text-gray-300">|</span>
            <svg
              class="w-4 h-4 text-pink-600"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849s-.011 3.584-.069 4.849c-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07s-3.584-.012-4.849-.07c-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849s.012-3.584.07-4.849c.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948s.014 3.667.072 4.947c.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072s3.667-.014 4.947-.072c4.358-.2 6.78-2.618 6.98-6.98.058-1.28.072-1.689.072-4.948s-.014-3.667-.072-4.947c-.2-4.358-2.618-6.78-6.98-6.98-1.28-.058-1.689-.072-4.948-.072zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.162 6.162 6.162 6.162-2.759 6.162-6.162-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"
              />
            </svg>
          </a>
        </div>
        <p class="text-xs text-gray-400">© 2026 Wapi APP • Chile</p>
      </div>
    </footer>

    <!-- CARRITO FLOTANTE -->
    <div
      id="cart-bar"
      class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 transform translate-y-full transition-transform duration-300 z-40 shadow-2xl"
    >
      <div
        class="container mx-auto max-w-2xl flex justify-between items-center"
      >
        <div>
          <p class="text-xs text-gray-400 font-bold uppercase">Total</p>
          <p id="cart-total" class="text-2xl font-black text-red-600">$0</p>
        </div>
        <button
          onclick="openCheckout()"
          class="bg-red-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg"
        >
          Confirmar Pedido
        </button>
      </div>
    </div>

    <!-- MODAL PERSONALIZACIÓN -->
    <div
      id="modal-custom"
      class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden flex items-end sm:items-center justify-center p-0 sm:p-4"
      onclick="if (event.target == this) closeModal();"
    >
      <div
        class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl overflow-hidden modal-enter"
      >
        <div class="p-6">
          <div class="flex justify-between items-start mb-4">
            <h3 id="modal-title" class="text-2xl font-bold text-gray-800"></h3>
            <button
              onclick="closeModal()"
              class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </button>
          </div>
          <p id="modal-desc" class="text-gray-500 mb-6 text-sm"></p>
          <div id="ingredients-container" class="space-y-3 mb-6"></div>
          <div class="mb-6">
            <label class="block text-xs font-bold text-gray-400 uppercase mb-2"
              >Instrucciones especiales</label
            >
            <textarea
              id="extra-notes"
              rows="2"
              placeholder="Ej: Sin sal, bien tostado..."
              class="w-full p-4 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-red-200 transition-all text-sm"
            ></textarea>
          </div>
          <button
            id="add-btn"
            class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-red-700 transition-all"
          >
            Agregar al Pedido
          </button>
        </div>
      </div>
    </div>

    <script>
      const products = [
        // COMPLETOS
        {
          id: "c_italiano",
          category: "completos",
          name: "Italiano",
          price: 3000,
          desc: "Palta, tomate y mayo casera.",
          ingredients: ["Palta", "Tomate", "Mayo Casera"],
          img: "https://images.unsplash.com/photo-1541214113241-21578d2d9b62?auto=format&fit=crop&q=80&w=400",
        },
        {
          id: "c_dinamico",
          category: "completos",
          name: "Dinámico",
          price: 3500,
          desc: "Italiano + Salsa americana, chucrut.",
          ingredients: [
            "Palta",
            "Tomate",
            "Mayo",
            "Salsa Americana",
            "Chucrut",
          ],
          img: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&q=80&w=400",
        },
        {
          id: "c_especial",
          category: "completos",
          name: "Especial",
          price: 2500,
          desc: "Vienesa con Mayo casera.",
          ingredients: ["Mayo Casera"],
          img: "https://images.unsplash.com/photo-1612392062631-94dd858cba88?auto=format&fit=crop&q=80&w=400",
        },
        {
          id: "c_pobre",
          category: "completos",
          name: "A lo Pobre",
          price: 3800,
          desc: "Huevo frito y cebolla caramelizada.",
          ingredients: ["Huevo Frito", "Cebolla Caramelizada"],
          img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=400",
        },

        // SANDWICHES
        {
          id: "s_churrasco_it",
          category: "sandwiches",
          name: "Churrasco Italiano",
          price: 6500,
          desc: "Carne premium, palta, tomate y mayo.",
          ingredients: ["Carne", "Palta", "Tomate", "Mayo"],
          img: "https://images.unsplash.com/photo-1553979459-d2229ba7433b?auto=format&fit=crop&q=80&w=400",
        },
        {
          id: "s_barros_luco",
          category: "sandwiches",
          name: "Barros Luco",
          price: 6000,
          desc: "Carne a la plancha con abundante queso fundido.",
          ingredients: ["Carne", "Queso Fundido"],
          img: "https://images.unsplash.com/photo-1521305916504-4a1121188589?auto=format&fit=crop&q=80&w=400",
        },
        {
          id: "s_chacarero",
          category: "sandwiches",
          name: "Chacarero",
          price: 6200,
          desc: "Carne, porotos verdes, ají verde y tomate.",
          ingredients: ["Carne", "Porotos Verdes", "Ají Verde", "Tomate"],
          img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&q=80&w=400",
        },

        // PAPAS FRITAS
        {
          id: "p_indiv",
          category: "papas",
          name: "Papas Individual",
          price: 2500,
          desc: "Porción personal crujiente.",
          ingredients: ["Sal"],
          img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&q=80&w=400",
        },
        {
          id: "p_mediana",
          category: "papas",
          name: "Papas Mediana",
          price: 4500,
          desc: "Ideal para compartir entre dos.",
          ingredients: ["Sal"],
          img: "https://images.unsplash.com/photo-1576101917194-62a14bc0c7af?auto=format&fit=crop&q=80&w=400",
        },
        {
          id: "p_fam",
          category: "papas",
          name: "Papas Familiar",
          price: 7500,
          desc: "La más grande de la casa.",
          ingredients: ["Sal"],
          img: "https://images.unsplash.com/photo-1630384060421-cb20d0e0649d?auto=format&fit=crop&q=80&w=400",
        },

        // BEBIDAS
        {
          id: "b_lata",
          category: "bebidas",
          name: "Bebida Lata 350cc",
          price: 1500,
          desc: "Coca-Cola, Fanta, Sprite, Pap.",
          ingredients: [],
          img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&q=80&w=400",
        },
        {
          id: "b_15l",
          category: "bebidas",
          name: "Bebida 1.5L",
          price: 3000,
          desc: "Formato familiar.",
          ingredients: [],
          img: "https://images.unsplash.com/photo-1581006852262-e4307cf6283a?auto=format&fit=crop&q=80&w=400",
        },
        {
          id: "b_jugo",
          category: "bebidas",
          name: "Jugo Natural",
          price: 2500,
          desc: "Fruta de la estación.",
          ingredients: [],
          img: "https://images.unsplash.com/photo-1573506400329-873099908658?auto=format&fit=crop&q=80&w=400",
        },

        // PASTELERÍA
        {
          id: "d_torta",
          category: "pasteles",
          name: "Torta del Día (Trozo)",
          price: 3500,
          desc: "Casera y fresquita.",
          ingredients: [],
          img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&q=80&w=400",
        },
        {
          id: "d_pie",
          category: "pasteles",
          name: "Pie de Limón",
          price: 2800,
          desc: "Receta de la casa.",
          ingredients: [],
          img: "https://images.unsplash.com/photo-1519915028121-7d3463d20b13?auto=format&fit=crop&q=80&w=400",
        },
      ];

      let cart = [];
      let currentItem = null;

      function renderMenu() {
        const categories = [
          "completos",
          "sandwiches",
          "papas",
          "bebidas",
          "pasteles",
        ];
        categories.forEach((cat) => {
          const list = document.getElementById(`list-${cat}`);
          if (!list) return;
          list.innerHTML = "";
          products
            .filter((p) => p.category === cat)
            .forEach((p) => {
              list.innerHTML += `
                        <div class="bg-white p-3 rounded-2xl flex items-center shadow-sm border border-gray-100 hover:border-red-100 transition-all cursor-pointer" onclick="openCustomizer('${p.id}')">
                            <img src="${p.img}" class="w-20 h-20 object-cover rounded-xl mr-4 shadow-sm" onerror="this.src='https://via.placeholder.com/150?text=Comida'">
                            <div class="flex-grow">
                                <h3 class="font-bold text-gray-800">${p.name}</h3>
                                <p class="text-[11px] text-gray-400 line-clamp-1 mb-2">${p.desc}</p>
                                <span class="text-red-600 font-black text-sm">$${p.price.toLocaleString("es-CL")}</span>
                            </div>
                            <div class="bg-red-50 text-red-600 p-2 rounded-lg">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                            </div>
                        </div>
                    `;
            });
        });
      }

      function openCustomizer(id) {
        currentItem = products.find((p) => p.id === id);
        document.getElementById("modal-title").innerText = currentItem.name;
        document.getElementById("modal-desc").innerText = currentItem.desc;
        const ingDiv = document.getElementById("ingredients-container");
        ingDiv.innerHTML =
          currentItem.ingredients.length > 0
            ? '<label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">Personalizar ingredientes</label>'
            : "";
        currentItem.ingredients.forEach((i) => {
          ingDiv.innerHTML += `
                    <label class="flex items-center justify-between p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100">
                        <span class="text-sm font-medium text-gray-700">${i}</span>
                        <input type="checkbox" checked class="w-5 h-5 accent-red-600 rounded" data-ingredient="${i}">
                    </label>
                `;
        });
        document.getElementById("extra-notes").value = "";
        document.getElementById("modal-custom").classList.remove("hidden");
      }

      function addToCart() {
        const excluded = [];
        document
          .querySelectorAll('#ingredients-container input[type="checkbox"]')
          .forEach((cb) => {
            if (!cb.checked) excluded.push(cb.getAttribute("data-ingredient"));
          });
        cart.push({
          ...currentItem,
          excluded,
          notes: document.getElementById("extra-notes").value.trim(),
        });
        updateCartUI();
        closeModal();
      }

      function updateCartUI() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById("cart-total").innerText =
          `$${total.toLocaleString("es-CL")}`;
        document
          .getElementById("cart-bar")
          .classList.toggle("translate-y-full", cart.length === 0);
      }

      function closeModal() {
        document.getElementById("modal-custom").classList.add("hidden");
      }

      function openCheckout() {
        const name = prompt("¿Tu nombre para el pedido?");
        if (!name) return;
        let text = `*NUEVO PEDIDO - LAS DELICIAS DE MARY* 🌭🍰\n👤 *Cliente:* ${name}\n\n`;
        let total = 0;
        cart.forEach((it, idx) => {
          text += `*${idx + 1}. ${it.name}* ($${it.price.toLocaleString("es-CL")})\n`;
          if (it.excluded.length > 0)
            text += `   ❌ SIN: ${it.excluded.join(", ")}\n`;
          if (it.notes) text += `   📝 NOTA: ${it.notes}\n`;
          total += it.price;
        });
        text += `\n💰 *TOTAL:* $${total.toLocaleString("es-CL")}\n_Enviado vía Wapi APP_`;
        window.open(
          `https://wa.me/56986253841?text=${encodeURIComponent(text)}`,
        );
        cart = [];
        updateCartUI();
      }

      function scrollToSection(id) {
        const el = document.getElementById(id);
        const offset = 120;
        window.scrollTo({
          top: el.getBoundingClientRect().top + window.pageYOffset - offset,
          behavior: "smooth",
        });
      }

      window.onload = renderMenu;
    </script>
  </body>
</html>
