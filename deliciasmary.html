<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Las Delicias de Mary - Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --color-rojo: #d62828;
        --color-amarillo: #fbc02d;
      }
      .bg-brand-red {
        background-color: var(--color-rojo);
      }
      .text-brand-red {
        color: var(--color-rojo);
      }
      .border-brand-yellow {
        border-color: var(--color-amarillo);
      }
    </style>
  </head>
  <body class="bg-gray-100 font-sans text-gray-800">
    <header class="bg-[#fbc02d] shadow-md relative">
      <div class="container mx-auto px-4 py-6 flex flex-col items-center">
        <img
          src="https://i.imgur.com/WVWMcSO.png"
          alt="Logo"
          class="h-28 mb-3 drop-shadow-md"
        />
        <h1 class="text-3xl font-black uppercase text-red-700 tracking-tight">
          Las Delicias de Mary
        </h1>
        <p class="font-bold italic text-red-800 opacity-90">
          ¡Pastelería y Comida Rápida!
        </p>
      </div>
      <div class="h-2 bg-[#d62828]"></div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-5xl">
      <h2 class="text-2xl font-bold mb-6 border-l-8 border-red-600 pl-3">
        Comida Rápida 🌭
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="bg-white rounded-2xl shadow overflow-hidden">
          <img
            src="https://images.unsplash.com/photo-1627023911220-719c0751221f?auto=format&fit=crop&w=500"
            class="h-40 w-full object-cover"
          />
          <div class="p-4">
            <h3 class="font-bold text-lg">Completo Italiano</h3>
            <p class="text-gray-500 text-sm mb-4">
              Palta, tomate y mayo casera.
            </p>
            <div class="flex justify-between items-center">
              <span class="font-black text-red-600">$3.000</span>
              <div class="flex items-center bg-gray-100 rounded-full p-1">
                <button
                  onclick="changeQty('italiano', -1)"
                  class="w-7 h-7 bg-white rounded-full shadow text-sm"
                >
                  -
                </button>
                <span id="qty-italiano" class="px-3 font-bold">0</span>
                <button
                  onclick="changeQty('italiano', 1)"
                  class="w-7 h-7 bg-red-600 text-white rounded-full shadow text-sm"
                >
                  +
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-2xl shadow overflow-hidden">
          <img
            src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=500"
            class="h-40 w-full object-cover"
          />
          <div class="p-4">
            <h3 class="font-bold text-lg">Burger Mary</h3>
            <p class="text-gray-500 text-sm mb-4">
              Carne, queso, lechuga y salsa secreta.
            </p>
            <div class="flex justify-between items-center">
              <span class="font-black text-red-600">$5.500</span>
              <div class="flex items-center bg-gray-100 rounded-full p-1">
                <button
                  onclick="changeQty('burger', -1)"
                  class="w-7 h-7 bg-white rounded-full shadow text-sm"
                >
                  -
                </button>
                <span id="qty-burger" class="px-3 font-bold">0</span>
                <button
                  onclick="changeQty('burger', 1)"
                  class="w-7 h-7 bg-red-600 text-white rounded-full shadow text-sm"
                >
                  +
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <h2 class="text-2xl font-bold mb-6 border-l-8 border-yellow-500 pl-3">
        Pastelería y Dulces 🍰
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div
          class="bg-white rounded-2xl shadow overflow-hidden border-t-4 border-yellow-400"
        >
          <img
            src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=500"
            class="h-40 w-full object-cover"
          />
          <div class="p-4">
            <h3 class="font-bold text-lg">Trozo de Torta</h3>
            <p class="text-gray-500 text-sm mb-4">
              Variedad del día (Manjar, Lúcuma o Piña).
            </p>
            <div class="flex justify-between items-center">
              <span class="font-black text-red-600">$2.500</span>
              <div class="flex items-center bg-gray-100 rounded-full p-1">
                <button
                  onclick="changeQty('torta', -1)"
                  class="w-7 h-7 bg-white rounded-full shadow text-sm"
                >
                  -
                </button>
                <span id="qty-torta" class="px-3 font-bold">0</span>
                <button
                  onclick="changeQty('torta', 1)"
                  class="w-7 h-7 bg-red-600 text-white rounded-full shadow text-sm"
                >
                  +
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div
        class="bg-white rounded-3xl p-6 shadow-2xl border-t-8 border-red-600"
      >
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <input
            type="text"
            id="name"
            placeholder="Tu Nombre"
            class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-red-500"
          />
          <input
            type="time"
            id="time"
            class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-red-500"
          />
        </div>
        <div class="flex justify-between items-center mb-6">
          <span class="text-xl">Total a pagar:</span>
          <span id="total-val" class="text-3xl font-black text-red-600"
            >$0</span
          >
        </div>
        <button
          onclick="sendOrder()"
          class="w-full bg-[#25D366] text-white font-bold py-4 rounded-2xl hover:bg-green-600 transition-all shadow-lg"
        >
          PEDIR POR WHATSAPP 📲
        </button>
      </div>
    </main>

    <script>
      const menu = {
        italiano: { name: "Completo Italiano", price: 3000, qty: 0 },
        burger: { name: "Burger Mary", price: 5500, qty: 0 },
        torta: { name: "Trozo de Torta", price: 2500, qty: 0 },
      };

      function changeQty(id, delta) {
        if (menu[id].qty + delta >= 0) {
          menu[id].qty += delta;
          document.getElementById(`qty-${id}`).innerText = menu[id].qty;
          let total = 0;
          for (let k in menu) total += menu[k].price * menu[k].qty;
          document.getElementById("total-val").innerText =
            `$${total.toLocaleString("es-CL")}`;
        }
      }

      function sendOrder() {
        const n = document.getElementById("name").value;
        const t = document.getElementById("time").value;
        if (!n || !t) return alert("Completa nombre y hora");

        let items = "";
        let grandTotal = 0;
        for (let k in menu) {
          if (menu[k].qty > 0) {
            items += `- ${menu[k].qty}x ${menu[k].name}\n`;
            grandTotal += menu[k].price * menu[k].qty;
          }
        }
        if (grandTotal === 0) return alert("Selecciona productos");

        const msg = `*PEDIDO - LAS DELICIAS DE MARY*\n\n👤 *Cliente:* ${n}\n⏰ *Retiro:* ${t}\n\n*Detalle:*\n${items}\n💰 *TOTAL:* $${grandTotal.toLocaleString("es-CL")}`;
        window.open(
          `https://wa.me/56986253841?text=${encodeURIComponent(msg)}`,
        );
      }
    </script>
  </body>
</html>
